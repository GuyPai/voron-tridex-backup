[virtual_sdcard]
path: /home/biqu/printer_data/gcodes
on_error_gcode: PRINT_CANCEL

[include mainsail.cfg]
[include ebb36_Right.cfg]
[include ebb36_Left.cfg]
[include fanControl.cfg]
[include macros.cfg]
[include neopixel_leds.cfg]
[include eddy.cfg]
[include Orbiter2_SmartSensor.cfg]
[include IDEX_mode.cfg]
# [include homing_override_for_idex.cfg]
# [include idex_macros.cfg]

# This file contains common pin mappings for the BIGTREETECH Manta M8P
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication.

# See docs/Config_Reference.md for a description of parameters.

[mcu]
# serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_270027000A504B4633373520-if00
canbus_uuid: 2d78c06320c4
#restart_method: command


[exclude_object]

[skew_correction]


[printer]
kinematics: hybrid_corexy  # corexy for standard Trident
max_velocity: 300  
max_accel: 6000    			#Max 4000
max_z_velocity: 25 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
# square_corner_velocity: 5.0


########################################
# X Steppers
########################################

[stepper_x]
# Socket M2
step_pin: PF12
dir_pin: !PF11
enable_pin: !PB3
microsteps: 32
rotation_distance: 40
endstop_pin: Left_EBBCan:PB6
position_endstop: -10
position_min: -12
position_max: 328
homing_speed: 60
homing_retract_dist: 5
second_homing_speed: 10

[tmc2209 stepper_x]
# Socket M2
uart_pin: PF13
run_current: 0.8
interpolate: false
stealthchop_threshold: 0

[dual_carriage] 
# Socket M1
# Controls Right Toolhead
axis: x
step_pin: PE2
dir_pin: !PB4
enable_pin: !PC11
microsteps: 32
rotation_distance: 40
endstop_pin: Right_EBBCan:PB6
position_endstop: 350
position_min: 22
position_max: 355
homing_speed: 60
homing_retract_dist: 5
second_homing_speed: 10

[tmc2209 dual_carriage]
# Socket M1
uart_pin: PC10
run_current: 0.8
interpolate: false
stealthchop_threshold: 0

########################################
# Y Steppers
########################################

[stepper_y]
# Socket M4
step_pin: PD3
dir_pin: !PD2
enable_pin: !PD5
microsteps: 32
rotation_distance: 40
endstop_pin: ^PF3
position_endstop: 350
position_max: 350
position_min: 0
homing_speed: 40
homing_retract_dist: 5

[tmc2209 stepper_y]
# Socket M4
uart_pin: PD4
run_current: 0.8
interpolate: false
stealthchop_threshold: 0

[stepper_y1]
# Socket M5
step_pin: PC9
dir_pin: PC8
enable_pin: !PD1
microsteps: 32
rotation_distance: 40
endstop_pin: ^PF4 #^PA2 #y-max tmc2209_stepper_y1:virtual_endstop

[tmc2209 stepper_y1]
# Socket M5
uart_pin: PD0
run_current: 0.8
interpolate: false
stealthchop_threshold: 0

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on MOTOR-8
[stepper_z]
step_pin: PA10
dir_pin: !PA14
enable_pin: !PA15
# step_pin: PD8
# dir_pin: !PC6
# enable_pin: !PC7
# Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4    
microsteps: 32
endstop_pin: probe:z_virtual_endstop
# endstop_pin: tmc2209_stepper_z:virtual_endstop
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##  Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: -0.5
## All builds use same Max Z
position_max: 250
position_min: -2.5
homing_speed: 8.0 # Leadscrews are slower than 2.4, 10 is a recommended max.
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PF8
# uart_pin: PD10
interpolate: true
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z1 Stepper - Rear on Motor-7
[stepper_z1]
step_pin: PD11
dir_pin: !PD9
enable_pin: !PD15
# Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4
microsteps: 32
# endstop_pin: tmc2209_stepper_z1:virtual_endstop

[tmc2209 stepper_z1]
uart_pin: PD14
interpolate: true
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z2 Stepper - Front Right on Motor-6
[stepper_z2]
step_pin: PD8
dir_pin: !PC6
enable_pin: !PC7
# step_pin: PA10
# dir_pin: !PA14
# enable_pin: !PA15
# Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4  
microsteps: 32
# endstop_pin: tmc2209_stepper_z2:virtual_endstop

[tmc2209 stepper_z2]
uart_pin: PD10
# uart_pin: PF8
interpolate: true
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0



#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
##	SSR Pin - HE1
heater_pin: PB5 
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for Keenovo heaters
sensor_type: Generic 3950
sensor_pin: PA0
##  Adjust max_power so it doesn't exceed the SSR rating. The Omron G3NA-210B-DC5 SSR is rated at 4 amps without a heatsink.
##  The formula is "4 / (Wattage_of_bed_heater / Mains_voltage) = max_power"
##  If max_power is greater than 1.0, use 1.0
max_power: 1
min_temp: 0
max_temp: 125
# control: pid
# pid_kp: 58.437
# pid_ki: 2.347
# pid_kd: 363.769



#####################################################################
# 	input Shaper
#####################################################################
    
[input_shaper]
#shaper_freq_x: 56.8
#shaper_type_x: mzv
#shaper_freq_y: 36.4
#shaper_type_y: mzv



#####################################################################
# 	LED Control
#####################################################################

[output_pin caselight]
# Chamber Lighting - HE2 Connector (Optional)
pin: PE3
pwm:true
shutdown_value: 0
value: 0.0
cycle_time: 0.01

#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[safe_z_home]
##	XY Location of the Z Endstop Switch
##	Update -10,-10 to the XY coordinates of your endstop pin 
##	(such as 157,305) after going through Z Endstop Pin
##	Location Definition step.
home_xy_position:170,170
speed:100
z_hop:10

[z_tilt]
##  Use Z_TILT_ADJUST to level the bed .
##  z_positions: Location of toolhead

##--------------------------------------------------------------------
## Uncomment below for 250mm build
#z_positions:
#    -50, 18
#    125, 298
#    300, 18
#points:
#    30, 5
#    125, 195
#    220, 5

## Uncomment below for 300mm build
#z_positions:
#   -50, 18
#   150, 348
#   350, 18
#points:
#   30, 5
#   150, 245
#   270, 5

## Uncomment below for 350mm build
z_positions:
   -50, 18
   175, 398
   400, 18
points:
   55, 5
   175, 295
   270, 5
##--------------------------------------------------------------------

speed: 300
horizontal_move_z: 10
retries: 3
retry_tolerance: 0.0075



