# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu Right_EBBCan]
canbus_uuid: edde08b84f69

# [temperature_sensor Chamber]
# sensor_type: ATC Semitec 104NT-4-R025H42G
# sensor_pin: Right_EBBCan: PA3


[temperature_sensor EBB_Right]
sensor_type: temperature_mcu
sensor_mcu: Right_EBBCan
min_temp: 0
max_temp: 150


# Resonamce Tester
# execute 'SHAPER_CALIBRATE' in GCode CLI for auto calibration, and 'SAVE_CONFIG' to save.
[adxl345]
cs_pin: Right_EBBCan: PB12
spi_software_sclk_pin: Right_EBBCan: PB10
spi_software_mosi_pin: Right_EBBCan: PB11
spi_software_miso_pin: Right_EBBCan: PB2
axes_map: z,y,x

[resonance_tester]
probe_points: 175, 175, 20
accel_chip: adxl345


[extruder1]
#
# PID_CALIBRATE HEATER=<config_name> TARGET=<temperature>
#
step_pin: Right_EBBCan: PD0
dir_pin: Right_EBBCan: PD1
enable_pin: !Right_EBBCan: PD2
microsteps: 16
#rotation_distance: 4.637
rotation_distance: 4.4866
# gear_ratio: 50:10               #BMG Gear Ratio
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: Right_EBBCan: PB13

min_temp: 0
max_temp: 350
min_extrude_temp: 180
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
max_extrude_cross_section: 50

pressure_advance:0.02
pressure_advance_smooth_time: 0.03

# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: EBBCan: PA3
# control: pid
# pid_Kp: 21.527
# pid_Ki: 1.063
# pid_Kd: 108.982

sensor_type: MAX31865
sensor_pin: Right_EBBCan: PA4
spi_bus: spi1
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2

[heater_fan hotend_fan]
pin: Right_EBBCan: PA0
heater: extruder1
heater_temp: 50.0

[tmc2209 extruder1]
uart_pin: Right_EBBCan: PA15
run_current: 0.650
sense_resistor: 0.11
stealthchop_threshold: 999999


